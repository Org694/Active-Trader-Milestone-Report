<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Card Generator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
    }
    #gift-card-generator {
      width: 300px;
      margin: 40px auto;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div id="gift-card-generator">
    <h2>Select a Gift Card</h2>
    <select id="gift-card-select">
      <option value="amazon">Amazon</option>
      <option value="itunes">iTunes</option>
      <option value="google-play">Google Play</option>
    </select>
    <button id="generate-btn">Generate Code</button>
    <input id="code-input" type="text" readonly>
    <button id="copy-btn">Copy Code</button>
    <button id="back-to-trade">Back to Trade</button>
  </div>

  <script>
    const giftCardSelect = document.getElementById('gift-card-select');
    const generateBtn = document.getElementById('generate-btn');
    const codeInput = document.getElementById('code-input');
    const copyBtn = document.getElementById('copy-btn');
    const backToTradeBtn = document.getElementById('back-to-trade');

    generateBtn.addEventListener('click', () => {
      const giftCardType = giftCardSelect.value;
      const generatedCode = generateCode(giftCardType);
      codeInput.value = generatedCode;
    });

    copyBtn.addEventListener('click', () => {
      codeInput.select();
      document.execCommand('copy');
      alert('Code copied!');
    });

    backToTradeBtn.addEventListener('click', () => {
      window.location.href = 'https://your-trade-website.com'; // Update with your trade website URL
    });

    function generateCode(giftCardType) {
      // Implement your code generation logic here
      // For demo purposes, return a random code
      return `GCG-${Math.random().toString(36).substr(2, 10).toUpperCase()}`;
    }
  </script>
</body>
</html>
